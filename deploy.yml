apiVersion: apps/v1
kind: Deployment
metadata:
  name: todolist
  namespace: def
spec:
  replicas: 2
  selector:
    matchLabels:
      app: todolist
  template:
    metadata:
      labels:
        app: todolist
    spec:
      containers:
      - name: todolist
        image: triptisingh0/todo 
        ports:
        - containerPort: 3000 
